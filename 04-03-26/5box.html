<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bigbox{
            width: 500px;
            height: 500px;
            background-color: rgba(255, 228, 196, 0.306);
            border: 4px solid rgb(255, 228, 196);
            align-items: center;
            display: flex;
            
            
        }
        .box1{
           width: 50px;
            height: 50px;
            background-color: rgb(63, 41, 63);
            border: 4px solid rebeccapurple;
            margin: 20px;
        }

        .box2{
            width: 50px;
            height: 50px;
            background-color: rgb(78, 49, 14);
            border: 4px solid rgb(255, 0, 89);
            margin: 20px;
        }
        .box3{
            width: 50px;
            height: 50px;
            background-color: rgb(78, 49, 14);
            border: 4px solid rgb(255, 0, 0);
            margin: 20px;
        }
        .box4{
            width: 50px;
            height: 50px;
            background-color: rgb(78, 49, 14);
            border: 4px solid rgba(9, 82, 114, 0.705);
            margin: 20px;
        }
        .box5{
            width: 50px;
            height: 50px;
            background-color: rgb(78, 49, 14);
            border: 4px solid rgb(68, 0, 255);
            margin: 20px;
        }


    </style>
</head>
<body>
    <div class="bigbox">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>

    </div>
</body>
</html>
